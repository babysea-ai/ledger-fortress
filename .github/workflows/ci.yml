name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typescript:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: client/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/typescript/package-lock.json
      - name: Install
        run: npm ci || npm install
      - name: Typecheck
        run: npm run lint
      - name: Build
        run: npm run build

  python:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ./client/python
          pip install pytest ruff
      - name: Lint
        run: ruff check client/python
      - name: Test
        run: pytest client/python -q

  sql:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ledger_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Apply migrations in order
        env:
          PGPASSWORD: postgres
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ledger_test
        run: |
          for f in migrations/*.sql; do
            echo "applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Verify RLS is forced on every table
        env:
          PGPASSWORD: postgres
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ledger_test
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -tAc "
            SELECT count(*) FROM pg_class
            WHERE relname IN ('plans','credits','credit_ledger','credit_alert_settings','credit_alert_log')
              AND (relrowsecurity = false OR relforcerowsecurity = false);
          " | grep -q '^0$' || (echo 'RLS not enabled+forced on all tables' && exit 1)
